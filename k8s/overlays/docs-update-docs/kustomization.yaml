apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: games-docs-update-docs

  # 1. Update the internal ingress to use the branch name

  # 2. "Disable" the external ingress by assigning it a dummy internal-only host
patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: docs-update-docs.apps.internal.garflak.com
    - op: replace
      path: /spec/tls/0/hosts/0
      value: docs-update-docs.apps.internal.garflak.com
  target:
    kind: Ingress
    name: realm-of-echoes-ingress
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: docs-update-docs.local
  target:
    kind: Ingress
    name: realm-of-echoes-ingress-external
images:
- name: registry.gitlab.internal.garflak.com/development/realm_of_echoes
  newName: registry.gitlab.internal.garflak.com/development/realm_of_echoes
  newTag: fd75d9b1
