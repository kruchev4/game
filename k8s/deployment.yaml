apiVersion: apps/v1
kind: Deployment
metadata:
  name: realm-of-echoes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realm-of-echoes
  template:
    metadata:
      labels:
        app: realm-of-echoes
    spec:
      containers:
        - name: realm-of-echoes
          image: registry.gitlab.internal.garflak.com/development/realm_of_echoes:3853779b
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: realm-of-echoes-svc
spec:
  selector:
    app: realm-of-echoes
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: realm-of-echoes-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "internal-acme-issuer"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - echoes.internal.garflak.com
      secretName: realm-of-echoes-tls
  rules:
    - host: echoes.internal.garflak.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: realm-of-echoes-svc
                port:
                  number: 80
