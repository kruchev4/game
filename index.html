<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Realm of Echoes</title>
  <link rel="stylesheet" href="./src/styles/global.css" />
  <link rel="stylesheet" href="./src/styles/screens.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="./src/main.js"></script>
  <script>
    // Block browser zoom (Ctrl+scroll and Ctrl+±/0)
    // Block all scroll and browser zoom
    window.addEventListener("wheel", e => {
      e.preventDefault(); // block ALL scroll — game handles zoom via canvas listener
    }, { passive: false });

    window.addEventListener("keydown", e => {
      if (e.ctrlKey && ["=", "+", "-", "0"].includes(e.key)) {
        e.preventDefault();
      }
    });


  </script>
  <div id="chat-wrapper" style="position: absolute; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">

    <div id="chat-container" style="width: 300px; height: 200px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 5px; display: flex; flex-direction: column; color: white; font-family: sans-serif; display: none;">
      <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 4px;"></div>
      <input type="text" id="chat-input" placeholder="Press Enter to chat..." style="background: rgba(0,0,0,0.5); border: none; border-top: 1px solid #444; color: white; padding: 8px; outline: none;">
    </div>

    <button id="chat-toggle-btn" style="background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #444; border-radius: 5px; padding: 8px 16px; cursor: pointer;">
      💬 Chat
    </button>

  </div>
</body>
</html>
