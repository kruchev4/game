<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Realm of Echoes</title>
  <link rel="stylesheet" href="./src/styles/global.css" />
  <link rel="stylesheet" href="./src/styles/screens.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="./src/main.js"></script>
  <script>
    // Block browser zoom (Ctrl+scroll and Ctrl+±/0)
    window.addEventListener("wheel", e => {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });

    window.addEventListener("keydown", e => {
      if (e.ctrlKey && ["=", "+", "-", "0"].includes(e.key)) {
        e.preventDefault();
      }
    });

    // Request fullscreen on first click — browsers require a user gesture
    document.addEventListener("click", function goFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        (el.requestFullscreen?.() ||
         el.webkitRequestFullscreen?.() ||
         el.mozRequestFullScreen?.())
          ?.catch(() => {}); // silently ignore if denied
      }
      document.removeEventListener("click", goFullscreen);
    }, { once: true });

    // Re-enter fullscreen if user accidentally exits (e.g. hits Escape)
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        // Small delay so Escape key for menus doesn't fight fullscreen
        setTimeout(() => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().catch(() => {});
          }
        }, 1500);
      }
    });
  </script>
</body>
</html>
